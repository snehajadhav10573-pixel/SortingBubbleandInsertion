<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insertion Sort Visualization</title>
  <link rel="stylesheet" href="insertionSortCss.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>


  <script>
var count=1;
var arr = []; 
var divDisplay = 1;
var ttime=0;
var shift=0;

$(document).ready(function() {
  $("#next").click(function(){
    if (count < arr.length) {
      count += 1; 
      if(count==arr.length)
        document.getElementById("next").disabled=true;
    }
    document.getElementById("prev").disabled=false;
    $("." + count).css("display", "grid");
    for (let i = 1; i <= arr.length + 1; i++) {
      if (i != count) $("." + i).css("display", "none");
    }
    $("#prev").css("visibility","visible");
  });

  $("#prev").click(function() {
    if (count > 1){ 
      count -= 1;
      if(count==1)
        document.getElementById("prev").disabled=true;
    }
    document.getElementById("next").disabled=false;
    for (let i = 1; i <= arr.length + 1; i++) {
      if (i != count) $("." + i).css("display", "none");
    }
    $("." + count).css("display", "grid");
  });
});

function activate_display_input()
{  
  document.getElementById("sorting").disabled=false;
  stepCounter=0;
  var input=document.getElementById("input_select").value;
  if(input=="User_input")
  {   
    document.getElementById("input_display_box").value="";
    document.getElementById("input_display_box").disabled=false;
    document.getElementById("input_display_box").style.backgroundColor="white";
  }
  else if(input=="not_selected")
  { 
    document.getElementById("input_display_box").value="";
    document.getElementById("swaping").innerHTML="<h2>Please Select an Input!</h2>";
    document.getElementById("time_complex").style.display="none";
    document.getElementById("next").style.visibility="hidden";
    document.getElementById("prev").style.visibility="hidden";       
  }
  else
  {
    let length=5;
    let randomArray=[];
    for(let i=0;i<length;i++)
      randomArray.push(Math.floor(Math.random()*100));   
    document.getElementById("input_display_box").disabled=true;
    document.getElementById("input_display_box").style.backgroundColor="gainsboro";
    if(input=="Best")
    {
      randomArray.sort();
      document.getElementById("input_display_box").value=randomArray;
    }
    if(input=="Worst")
    {
      randomArray.sort();
      randomArray.reverse();
      document.getElementById("input_display_box").value=randomArray;
    }
    if(input=="Average")
    {
      document.getElementById("input_display_box").value=randomArray;
    }
  }
}
    
var stepCounter = 0;
var once=0;

function displayStepRow(arr, keyElement) {
  stepCounter += 1;
  var CardsContainer = document.getElementById("swaping");
  var row = document.createElement("div");
  row.className = "row oprow " + divDisplay;
  row.style.gridTemplateColumns = `repeat(${arr.length + 1}, 1fr)`; 
  var stepLabel = document.createElement("div");
  stepLabel.className = "step-label";
  if (once < 1) {
    stepLabel.innerHTML = `Step ${stepCounter}`;
    once++;
  }
  else {
    stepLabel.innerHTML = `Key Insertion<br>Step ${stepCounter}`;
  }
  row.appendChild(stepLabel);
  for (let i = 0; i < arr.length; i++) {
    var card = document.createElement("div");
    card.className = "card";
    if (i === keyElement) card.className = "card keyElement"; 
    card.innerHTML = arr[i];
    row.appendChild(card);
  }
  CardsContainer.appendChild(row);
}

function animateDivElements(arr, index1, index2) {
  var CardsContainer = document.getElementById("swaping");
  var row = document.createElement("div");
  row.className = "row oprow " + divDisplay + " shift_" + shift;
  row.style.gridTemplateColumns = `repeat(${arr.length + 1}, 1fr)`; 
  var stepLabel = document.createElement("div");
  stepLabel.className = "step-label";
  stepLabel.innerHTML = `Shifting<br>Step changes`;
  row.appendChild(stepLabel);
  for (let i = 0; i < arr.length; i++) {
    var card = document.createElement("div");
    card.className = "card";
    card.innerHTML = arr[i];
    if (i === index1) {
      card.className = "blinky2";
    } 
    else if (i === index2) {
      card.className = "blinky1";
      card.style.visibility = "hidden";
    }
    row.appendChild(card);
  }
  CardsContainer.appendChild(row);
}

function insertionSort(arr) {
  let startTime = performance.now();
  once=0;
  var gridContainer = document.getElementById("swaping");
  gridContainer.innerHTML = "";
  divDisplay = 1; 
  displayStepRow(arr,-1);
  $("." + divDisplay).css("display", "grid");
  divDisplay += 1;
  for (let i = 1; i < arr.length; i++) {
    var key = arr[i];
    var j = i - 1;
    while (j >= 0 && arr[j] > key) {
      shift++;
      arr[j + 1] = arr[j];
      animateDivElements(arr, j, j + 1);
      j = j - 1;
      ttime++;
    }
    arr[j + 1] = key;
    displayStepRow(arr,j+1); 
    divDisplay += 1;
    ttime++;
    shift=0;
  }
  let endTime = performance.now();
  let timeTaken = endTime - startTime;
  document.getElementById("time_complex").innerHTML = `Step count is: ${ttime}<br>Time Complexity in ms: ${timeTaken.toFixed(3)} s`;
  document.getElementById("sorting").disabled = true;
}

function get_input()
{    
  ttime=0;
  var str=document.getElementById("input_display_box").value;
  if(str.length!=0)
  {   
    arr=str.split(",");
    count=1;
    divDisplay=1;
    insertionSort(arr);
    document.getElementById("time_complex").style.display="block";           
    document.getElementById("next").style.visibility="visible";
    document.getElementById("next").disabled=false;
    document.getElementById("prev").style.visibility="hidden";
  }
  else{
    document.getElementById("swaping").innerHTML="<h2>Please Select an Input!</h2>";
  }
}

function displaytime() {
  let outputDiv = document.getElementById("swaping");
  document.getElementById("sorting").disabled=false;
  outputDiv.innerHTML = `
<h2 style="text-align:center; font-size:28px; color:#2c3e50; text-shadow:1px 1px 3px rgba(0,0,0,0.1); margin-bottom:20px; transition:all 0.5s ease-in-out;">Insertion Sort Performance</h2>
<div style="width:100%; margin:0 auto; background:#ffffff; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.2); padding:20px; transition:all 0.6s ease-in-out;">
  <table style="width:100%; border-collapse:collapse; text-align:center; font-family:'Segoe UI',sans-serif; font-size:14px; overflow:hidden; border-radius:15px;">
    <thead>
      <tr style="background-color: rgb(246, 238, 147); color:black; font-size:14px; text-transform:uppercase; letter-spacing:0.5px;">
        <th style="padding:12px; border:1px solid #ddd;">Case</th>
        <th style="padding:12px; border:1px solid #ddd;">Time Complexity</th>
        <th style="padding:12px; border:1px solid #ddd;">Time (in sec)</th>
        <th style="padding:12px; border:1px solid #ddd;">Space Complexity</th>
        <th style="padding:12px; border:1px solid #ddd;">Comparisons</th>
        <th style="padding:12px; border:1px solid #ddd;">Swaps</th>
        <th style="padding:12px; border:1px solid #ddd;">Explanation</th>
      </tr>
    </thead>
    <tbody>
      <tr style="background-color:#f8f9fa; transition:background-color 0.3s ease;">
        <td style="padding:12px; border:1px solid #ddd;"><b>Best</b></td>
        <td style="padding:12px; border:1px solid #ddd;">O(n)</td>
        <td style="padding:12px; border:1px solid #ddd;">0.0001s</td>
        <td style="padding:12px; border:1px solid #ddd;">O(1)</td>
        <td style="padding:12px; border:1px solid #ddd;">4</td>
        <td style="padding:12px; border:1px solid #ddd;">0</td>
        <td style="padding:12px; border:1px solid #ddd;">Already sorted array<br>only one comparison per element.</td>
      </tr>
      <tr style="background-color:#ffffff; transition:background-color 0.3s ease;">
        <td style="padding:12px; border:1px solid #ddd;"><b>Average</b></td>
        <td style="padding:12px; border:1px solid #ddd;">O(n²)</td>
        <td style="padding:12px; border:1px solid #ddd;">0.5s</td>
        <td style="padding:12px; border:1px solid #ddd;">O(1)</td>
        <td style="padding:12px; border:1px solid #ddd;">8</td>
        <td style="padding:12px; border:1px solid #ddd;">5</td>
        <td style="padding:12px; border:1px solid #ddd;">Elements are partially sorted<br>half of the elements require shifting.</td>
      </tr>
      <tr style="background-color:#f8f9fa; transition:background-color 0.3s ease;">
        <td style="padding:12px; border:1px solid #ddd;"><b>Worst</b></td>
        <td style="padding:12px; border:1px solid #ddd;">O(n²)</td>
        <td style="padding:12px; border:1px solid #ddd;">1s</td>
        <td style="padding:12px; border:1px solid #ddd;">O(1)</td>
        <td style="padding:12px; border:1px solid #ddd;">10</td>
        <td style="padding:12px; border:1px solid #ddd;">10</td>
        <td style="padding:12px; border:1px solid #ddd;">Completely reversed array<br>every element is compared and shifted.</td>
      </tr>
    </tbody>
  </table>
</div>
`;
document.getElementById("time_complex").style.display="none";
document.getElementById("next").style.visibility="hidden";
document.getElementById("prev").style.visibility="hidden";}
  </script>
</head>

<body>
  <p><b>Insertion Sort</b></p>
  <div id="outer">
    <div id="input_container">
      <div id="input_box">
        <h1 style="font-size: 30px;">Select the Type of Input you Want:</h1>
        <select id="input_select" name="s" onchange="activate_display_input()">
          <option value="not_selected">Select desired input</option>
          <option value="Best">Best Case Input</option>
          <option value="Worst">Worst Case Input</option>
          <option value="Average">Average Case Input</option>
          <option value="User_input">User Input Array</option>
        </select>
      </div> 
      <div id="display_input">
        <h1>Input for Sorting:</h1>
        <input type="text" id="input_display_box" name="t"  style="background-color: gainsboro;"  placeholder="Add the array in this way 12,45,63,34,21" disabled>
      </div>
      <div id="button_sort" style="display:flex; align-items:center;">
        <button onclick="get_input()" id="sorting" style="align-self:center; margin-right:10px; border-radius:30px; box-shadow: 3px 3px 3px 3px grey; width:140px; height:50px; font-size: 27px;"><b>Sort</b></button>
        <button onclick="displaytime()" id="showtime" style="align-self:center; border-radius:30px; box-shadow: 3px 3px 3px 3px grey; width:220px; height:50px; font-size: 22px;"><b>Show Time Details</b></button>
      </div>
    </div> 
    <div id="output">
      <h1 style="font-size: 40px; margin-block-start: 3px;">Output</h1> 
      <div id="swaping">
        <h2>Please Select an Input!</h2>
      </div>
      <div><button id="prev">⬅</button> <button id="next">➡</button></div>
      <div id="time_complex"></div>
    </div>
  </div>
</body>
</html>
